name: CI

on:
  push:
    branches: ["master"]
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.platform.name }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.platform.os }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: Windows, os: windows-latest, xmake_args: "-p windows -a x64" }
          - { name: Linux, os: ubuntu-latest, xmake_args: "-p linux -a x86_64" }
          - { name: macOS, os: macos-latest, xmake_args: "-p macosx" }
        build_type:
          - debug
          - release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libpulse-dev libx11-dev libxext-dev libgl1-mesa-dev libpng-dev libjpeg-dev

      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure and Build
        run: |
          xmake f -y ${{ matrix.platform.xmake_args }} -m ${{ matrix.build_type }} -c
          xmake -y -a

      - name: Run Tests
        run: |
          xmake run mirengine-tests
